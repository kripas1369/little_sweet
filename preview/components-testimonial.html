<!-- @dsCard group="Components" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#FBFAF7;padding:24px 30px}
  .card{max-width:560px;background:#FFFFFF;border:1px solid rgba(20,17,11,.10);border-radius:16px;padding:24px 26px;box-shadow:0 4px 16px rgba(20,17,11,.05)}
  .stars{color:var(--gold);font-size:15px;letter-spacing:3px;margin-bottom:14px}
  .quote{font-family:var(--font-display);font-style:italic;font-weight:400;font-size:20px;line-height:1.5;color:#2A2620;margin:0 0 20px}
  .foot{display:flex;align-items:center;justify-content:space-between}
  .nm{font-weight:600;font-size:15px;color:#14110B;font-family:var(--font-body)}
  .role{font-family:var(--font-mono);font-size:11px;color:#8A857B;letter-spacing:.04em;margin-top:3px}
  .g{font-family:var(--font-body);font-size:12px;color:#8A857B;display:flex;align-items:center;gap:6px}
  .gdot{width:14px;height:14px;border-radius:50%;background:conic-gradient(#EA4335,#FBBC05,#34A853,#4285F4,#EA4335)}
</style></head>
<body>
  <div class="card">
    <div class="stars">★★★★★</div>
    <p class="quote">"The team exceeded all our expectations! Their attention to detail resulted in stunning visuals that perfectly represented our brand."</p>
    <div class="foot">
      <div><div class="nm">Himal Thakuri</div><div class="role">Marketing Director</div></div>
      <div class="g"><span class="gdot"></span>Google Review</div>
    </div>
  </div>
</body></html>
