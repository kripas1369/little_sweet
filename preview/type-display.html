<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#FBFAF7;padding:28px 30px}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#9A7212;margin-bottom:14px}
  .disp{font-family:var(--font-display);font-weight:800;font-size:62px;line-height:1.02;letter-spacing:-.02em;color:#14110B}
  .disp em{font-style:italic;font-weight:500;background:var(--gold-gradient-ink);-webkit-background-clip:text;background-clip:text;color:transparent}
  .foot{font-family:var(--font-mono);font-size:11px;color:#8A857B;margin-top:16px}
</style></head>
<body>
  <div class="eyebrow">◆ Display · Playfair Display</div>
  <div class="disp">Capture Every<br><em>Precious</em> Moment</div>
  <div class="foot">Playfair Display · 800 / italic 500 · 96px desktop, 56px mobile · tracking −0.02em</div>
</body></html>
