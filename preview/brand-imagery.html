<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#FBFAF7;padding:24px 30px}
  .row{display:flex;gap:16px}
  .fr{flex:1;height:170px;border-radius:14px;overflow:hidden;position:relative;border:1px solid rgba(20,17,11,.10)}
  .fr img{width:100%;height:100%;object-fit:cover;display:block}
  .raw img{filter:none}
  .gold::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.28),rgba(139,105,20,.10));mix-blend-mode:overlay}
  .gold img{filter:saturate(.85) contrast(1.05)}
  .scrim::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,8,8,0) 40%,rgba(8,8,8,.95))}
  .cap{position:absolute;left:14px;bottom:12px;z-index:2;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
  .cap2{position:absolute;left:14px;top:12px;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#FAFAFA;z-index:2;mix-blend-mode:difference}
</style></head>
<body>
  <div class="row">
    <div class="fr raw"><img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=600"><span class="cap2">Raw</span></div>
    <div class="fr gold"><img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=600"><span class="cap2">+ Gold overlay</span></div>
    <div class="fr scrim"><img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=600"><span class="cap">+ Bottom scrim</span></div>
  </div>
</body></html>
