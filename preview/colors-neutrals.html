<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#FBFAF7;font-family:var(--font-body);padding:26px}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--r-md);overflow:hidden;border:1px solid rgba(20,17,11,.10)}
  .chip{height:84px}
  .meta{padding:10px 12px;background:#FFFFFF}
  .name{font-family:var(--font-mono);font-size:11px;color:#14110B;letter-spacing:.04em;text-transform:uppercase}
  .hex{font-family:var(--font-mono);font-size:11px;color:#8A857B;margin-top:3px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FBFAF7"></div><div class="meta"><div class="name">Cream · page</div><div class="hex">#FBFAF7</div></div></div>
    <div class="sw"><div class="chip" style="background:#F3EFE6"></div><div class="meta"><div class="name">Cream-2 · section</div><div class="hex">#F3EFE6</div></div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">Paper · card</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#8A857B"></div><div class="meta"><div class="name">Muted · fg-3</div><div class="hex">#8A857B</div></div></div>
    <div class="sw"><div class="chip" style="background:#14110B"></div><div class="meta"><div class="name">Ink · fg-1</div><div class="hex">#14110B</div></div></div>
  </div>
</body></html>
