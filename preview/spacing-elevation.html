<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#FBFAF7;padding:30px 30px 38px}
  .row{display:flex;gap:26px;align-items:center;justify-content:center}
  .item{text-align:center}
  .box{width:120px;height:74px;background:#FFFFFF;border-radius:14px;border:1px solid rgba(20,17,11,.08)}
  .s1{box-shadow:0 2px 10px rgba(20,17,11,.05)}
  .s2{box-shadow:0 14px 36px rgba(20,17,11,.09)}
  .s3{box-shadow:0 26px 64px rgba(20,17,11,.12)}
  .s4{box-shadow:0 12px 40px rgba(201,168,76,.30);border-color:rgba(201,168,76,.45)}
  .n{font-family:var(--font-mono);font-size:10.5px;color:#14110B;margin-top:12px}
  .v{font-family:var(--font-mono);font-size:9.5px;color:#8A857B;margin-top:3px}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box s1"></div><div class="n">shadow-sm</div><div class="v">subtle</div></div>
    <div class="item"><div class="box s2"></div><div class="n">shadow-md</div><div class="v">card lift</div></div>
    <div class="item"><div class="box s3"></div><div class="n">shadow-lg</div><div class="v">modal</div></div>
    <div class="item"><div class="box s4"></div><div class="n">shadow-gold</div><div class="v">hover glow</div></div>
  </div>
</body></html>
