<!-- @dsCard group="Colors" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#FBFAF7;font-family:var(--font-body);padding:26px;color:#14110B}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .cell{border-radius:var(--r-md);padding:16px 18px;background:#FFFFFF;display:flex;align-items:center;gap:14px;border:1px solid rgba(20,17,11,.08)}
  .demo{width:64px;height:56px;border-radius:var(--r-sm);flex:none;background:#F3EFE6}
  .b1{border:1px solid rgba(20,17,11,.10)}
  .b2{border:1px solid rgba(20,17,11,.22)}
  .b3{border:1px solid rgba(201,168,76,.45)}
  .b4{box-shadow:0 12px 40px rgba(201,168,76,.30);border:1px solid rgba(201,168,76,.45)}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase}
  .val{font-family:var(--font-mono);font-size:10.5px;color:#8A857B;margin-top:4px}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><div class="demo b1"></div><div><div class="lbl">Hairline border</div><div class="val">rgba(20,17,11,.10)</div></div></div>
    <div class="cell"><div class="demo b2"></div><div><div class="lbl">Border · strong</div><div class="val">rgba(20,17,11,.22)</div></div></div>
    <div class="cell"><div class="demo b3"></div><div><div class="lbl">Gold accent border</div><div class="val">rgba(201,168,76,.45)</div></div></div>
    <div class="cell"><div class="demo b4"></div><div><div class="lbl">Gold glow · hover</div><div class="val">0 12px 40px /.30</div></div></div>
  </div>
</body></html>
