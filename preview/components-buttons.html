<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#FBFAF7;padding:28px 30px;color:#14110B}
  .grp{display:flex;gap:14px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .grp:last-child{margin-bottom:0}
  .btn{font-family:var(--font-body);font-weight:600;font-size:15px;border-radius:10px;padding:13px 26px;border:1.5px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .25s cubic-bezier(.16,1,.3,1)}
  .primary{background:var(--gold-gradient);color:#1C1606;box-shadow:0 2px 10px rgba(201,168,76,.25)}
  .outline{background:transparent;border-color:#14110B;color:#14110B}
  .ghost{background:transparent;color:#14110B}
  .sm{font-size:13px;padding:9px 18px}
  .lg{font-size:17px;padding:16px 34px}
  .cap{font-family:var(--font-mono);font-size:10px;color:#8A857B;letter-spacing:.08em;width:64px;flex:none}
</style></head>
<body>
  <div class="grp"><span class="cap">VARIANT</span><button class="btn primary">Book Now →</button><button class="btn outline">Client Login</button><button class="btn ghost">Watch Our Work →</button></div>
  <div class="grp"><span class="cap">SIZE</span><button class="btn primary sm">Search</button><button class="btn primary">Explore Packages</button><button class="btn primary lg">Book Your Session</button></div>
</body></html>
