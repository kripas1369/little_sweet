<!-- @dsCard group="Colors" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#FBFAF7;font-family:var(--font-body);padding:26px}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--r-md);overflow:hidden;border:1px solid rgba(20,17,11,.10)}
  .chip{height:88px}
  .meta{padding:10px 12px;background:#FFFFFF}
  .name{font-family:var(--font-mono);font-size:11px;color:#14110B;letter-spacing:.04em;text-transform:uppercase}
  .hex{font-family:var(--font-mono);font-size:11px;color:#8A857B;margin-top:3px}
  .grad{flex:1;height:88px;border-radius:var(--r-md);background:var(--gold-gradient)}
  .gl{display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px}
  .gl .name{color:#1C1606}.gl .hex{color:rgba(28,22,6,.7)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#E8C96A"></div><div class="meta"><div class="name">Gold Light</div><div class="hex">#E8C96A</div></div></div>
    <div class="sw"><div class="chip" style="background:#C9A84C"></div><div class="meta"><div class="name">Gold · primary</div><div class="hex">#C9A84C</div></div></div>
    <div class="sw"><div class="chip" style="background:#9A7212"></div><div class="meta"><div class="name">Gold Ink · on light</div><div class="hex">#9A7212</div></div></div>
    <div class="grad gl"><div class="name">Gold Gradient</div><div class="hex">135° · accent only</div></div>
  </div>
</body></html>
