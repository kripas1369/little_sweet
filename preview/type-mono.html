<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#FBFAF7;padding:26px 30px;color:#14110B}
  .label{font-family:var(--font-mono);font-weight:700;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:#9A7212;margin-bottom:18px}
  .pills{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
  .pill{font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;color:#4A463E;border:1px solid rgba(20,17,11,.14);padding:7px 14px;border-radius:999px;background:#FFFFFF}
  .stat{font-family:var(--font-mono);font-weight:700;font-size:13px;letter-spacing:.04em;color:#9A7212}
  .tag{font-family:var(--font-mono);font-size:10px;color:#8A857B;letter-spacing:.04em;margin-top:6px}
</style></head>
<body>
  <div class="label">◆ What Clients Say</div>
  <div class="pills">
    <span class="pill">WEDDING</span><span class="pill">BABY SHOWER</span><span class="pill">CORPORATE</span><span class="pill">NEWBORN</span>
  </div>
  <span class="stat">150+ PHOTOGRAPHERS · 4.9★ RATING</span>
  <div class="tag">Space Mono · 700 · uppercase · tracking 0.22em · for ◆ labels, tags, stats</div>
</body></html>
