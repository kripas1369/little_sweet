<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#FBFAF7;padding:26px 30px;color:#14110B}
  .sec{font-family:var(--font-mono);font-size:10px;color:#8A857B;letter-spacing:.08em;margin:0 0 11px}
  .row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px}
  .stat{display:inline-flex;align-items:center;gap:9px;background:#FFFFFF;border:1px solid rgba(20,17,11,.10);border-radius:999px;padding:10px 18px;font-family:var(--font-body);font-size:14px;color:#4A463E;box-shadow:0 2px 10px rgba(20,17,11,.05)}
  .stat b{color:#9A7212;font-weight:700}
  .feat{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(20,17,11,.22);border-radius:999px;padding:11px 20px;font-family:var(--font-body);font-weight:500;font-size:14px;color:#14110B;background:#FFFFFF}
</style></head>
<body>
  <p class="sec">STAT PILLS</p>
  <div class="row">
    <span class="stat">📷 <b>150+</b> Photographers</span>
    <span class="stat">⭐ <b>500+</b> Happy Clients</span>
    <span class="stat">🏆 <b>7 Years</b> of Excellence</span>
  </div>
  <p class="sec">FEATURE PILLS</p>
  <div class="row" style="margin-bottom:0">
    <span class="feat">🏆 Top Photographers</span>
    <span class="feat">💰 Transparent Pricing</span>
    <span class="feat">🔒 Secure &amp; Reliable</span>
  </div>
</body></html>
