<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#FBFAF7;padding:26px 30px}
  .row{display:flex;gap:16px;align-items:flex-end}
  .item{text-align:center}
  .box{width:84px;height:64px;background:#FFFFFF;border:1px solid rgba(20,17,11,.22)}
  .n{font-family:var(--font-mono);font-size:10.5px;color:#14110B;margin-top:9px}
  .v{font-family:var(--font-mono);font-size:10px;color:#8A857B;margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="n">r-xs</div><div class="v">4px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="n">r-sm</div><div class="v">8px · inputs</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="n">r-md</div><div class="v">14px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="n">r-lg</div><div class="v">20px</div></div>
    <div class="item"><div class="box" style="border-radius:999px;width:64px"></div><div class="n">r-pill</div><div class="v">full</div></div>
  </div>
</body></html>
