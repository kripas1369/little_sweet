<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Little Sweet Photography</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #FBFAF7; }
    ::selection { background: rgba(201,168,76,.28); color: #14110B; }

    @keyframes floatDot {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-26px) translateX(12px); }
    }
    @keyframes marqueeL { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes marqueeR { from { transform: translateX(-50%); } to { transform: translateX(0); } }
    @keyframes bannerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes kenBurns {
      from { transform: scale(1) translate(0, 0); }
      to   { transform: scale(1.12) translate(-1.5%, -1.5%); }
    }

    /* Responsive (kept so layout matches on-screen at print width) */
    @media (max-width: 1180px) { .scroll-dots { display: none !important; } }

    /* ===================== PRINT ===================== */
    @page { size: portrait; margin: 1cm; }

    @media print {
      html, body { background: #FBFAF7 !important; }
      *, *::before, *::after {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }

      /* Freeze all motion at its END state, and force JS-revealed content visible.
         Reveal sets inline opacity:0/translateY via React state — !important wins. */
      *, *::before, *::after {
        animation-delay: -99s !important;
        animation-duration: .001s !important;
        animation-iteration-count: 1 !important;
        animation-fill-mode: both !important;
        animation-play-state: running !important;
        transition: none !important;
        opacity: 1 !important;
        transform: none !important;
      }

      /* Hide the scroll-experience chrome — meaningless on paper */
      .scroll-progress, .scroll-dots, .scroll-top { display: none !important; }

      /* Let the sticky nav sit statically at the top of page 1 */
      nav { position: static !important; backdrop-filter: none !important; }

      /* The hero auto-scroll photo strip — keep on one page, no clipping mask */
      .hero-banner { -webkit-mask-image: none !important; mask-image: none !important; }
      .hero-banner > div { flex-wrap: nowrap !important; }

      header { min-height: 0 !important; padding-top: 24px !important; }

      /* Keep cards & steps from splitting across pages */
      .grid-3 > *, .bento > *, .steps > *, section { break-inside: avoid; }
      section { break-inside: avoid-page; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="ScrollFX.jsx"></script>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel" src="Testimonials.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>

  <!-- Auto-print: runs after Babel transpiles App (ordered last), once fonts,
       icons and remote images have had time to settle. -->
  <script type="text/babel">
    (function () {
      function waitImages(timeout) {
        // Resolve when all <img> are complete OR after a timeout cap.
        return new Promise((resolve) => {
          const imgs = Array.from(document.images || []);
          let pending = imgs.filter((i) => !i.complete).length;
          if (pending === 0) return resolve();
          let done = false;
          const finish = () => { if (!done) { done = true; resolve(); } };
          imgs.forEach((i) => {
            if (i.complete) return;
            const tick = () => { pending -= 1; if (pending <= 0) finish(); };
            i.addEventListener('load', tick, { once: true });
            i.addEventListener('error', tick, { once: true });
          });
          setTimeout(finish, timeout);
        });
      }

      function ready() {
        const fonts = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
        Promise.all([fonts, waitImages(4000)]).then(() => {
          if (window.lucide) window.lucide.createIcons();
          // settle layout (reveal overrides, icon swap) then print
          requestAnimationFrame(() => setTimeout(() => window.print(), 700));
        });
      }

      if (document.readyState === 'complete') ready();
      else window.addEventListener('load', ready);
    })();
  </script>
</body>
</html>
