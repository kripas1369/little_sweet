  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    html, body { margin: 0; background: #FBFAF7; }
    ::selection { background: rgba(201,168,76,.28); color: #14110B; }

    /* Custom gold scrollbar */
    html { scrollbar-width: thin; scrollbar-color: #C9A84C #F3EFE6; }
    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: #F3EFE6; }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #E8C96A, #C9A84C 55%, #8B6914);
      border-radius: 999px;
      border: 3px solid #F3EFE6;
      background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #F0D27A, #D4B255 55%, #9A7212);
      border-width: 2px;
    }
    ::-webkit-scrollbar-thumb:active { background: #C9A84C; }

    @keyframes floatDot {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-26px) translateX(12px); }
    }
    @keyframes marqueeL { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes marqueeR { from { transform: translateX(-50%); } to { transform: translateX(0); } }

    /* Hero entrance — staggered rise + fade */
    @keyframes heroIn {
      from { opacity: 0; transform: translateY(26px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-in { opacity: 0; animation: heroIn .8s cubic-bezier(.16,1,.3,1) forwards; }

    /* Cinematic photo banner */
    @keyframes bannerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes kenBurns {
      from { transform: scale(1) translate(0, 0); }
      to   { transform: scale(1.12) translate(-1.5%, -1.5%); }
    }
    .hero-banner:hover > div { animation-play-state: paused; }

    .cta-dark-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 14px 34px rgba(28,22,6,.4) !important; }

    .scroll-top:hover { transform: translateY(-3px) scale(1.06) !important; box-shadow: 0 16px 38px rgba(20,17,11,.26) !important; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .hero-in { opacity: 1 !important; animation: none !important; }
      *, *::before, *::after { animation-duration: .001s !important; }
    }

    /* Responsive */
    @media (max-width: 1180px) {
      .scroll-dots { display: none !important; }
    }
    @media (max-width: 900px) {
      .nav-desktop, .nav-actions { display: none !important; }
      .nav-burger { display: block !important; }
      .grid-3, .bento, .steps { grid-template-columns: 1fr !important; }
      .why-grid, .footer-grid { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 1100px) and (min-width: 901px) {
      .grid-3 { grid-template-columns: repeat(2, 1fr) !important; }
      .bento { grid-template-columns: repeat(2, 1fr) !important; }
    }
  </style>

          <path d="M-26 36 L-67 113 Q-116 66 -132 0 Z" opacity="0.62"/>

          <path d="M-18 -41 L-67 -113 Q0 -130 67 -113 Z" opacity="0.78"/>
          <path d="M26 -36 L67 -113 Q116 -66 132 0 Z" opacity="0.62"/>
        </g>
        <circle cx="0" cy="0" r="34" fill="#FBFAF7"/>

      <text x="600" y="600" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="700" fill="#14110B" text-anchor="middle">Little Sweet Photography</text>
      <text x="600" y="660" font-family="monospace" font-size="26" letter-spacing="6" fill="#9A7212" text-anchor="middle">LSP</text>
    </svg>
