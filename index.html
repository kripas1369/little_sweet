<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little Sweet Photography — Kathmandu's Premier Photography Studio</title>
  <meta name="description" content="Nepal's premier photography booking platform — connecting you with handpicked professionals for life's most unforgettable moments." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/three@0.161.0/build/three.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    /* ── Design tokens ─────────────────────────────────────────────────── */
    :root {
      --gold:        #C9A84C;
      --gold-light:  #E8C96A;
      --gold-dark:   #8B6914;
      --gold-ink:    #9A7212;
      --gold-gradient:     linear-gradient(135deg, #E8C96A 0%, #C9A84C 50%, #8B6914 100%);
      --gold-gradient-ink: linear-gradient(135deg, #C9A84C 0%, #A87E1E 55%, #7E5C10 100%);
      --black:       #0E0C08;
      --cream:       #FBFAF7;
      --cream-2:     #F3EFE6;
      --muted:       #8A857B;
      --border:        rgba(20,17,11,0.10);
      --border-strong: rgba(20,17,11,0.22);
      --border-gold:   rgba(201,168,76,0.45);
      --gold-glow:     rgba(201,168,76,0.30);
      --fg-1: #14110B;
      --fg-2: #4A463E;
      --fg-3: #8A857B;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
      --font-mono:    'Space Mono', monospace;
      --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-soft:   cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: #C9A84C #F3EFE6; }
    body { background: var(--cream); color: var(--fg-1); -webkit-font-smoothing: antialiased; }
    ::selection { background: rgba(201,168,76,.28); color: #14110B; }

    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #F3EFE6; }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #E8C96A, #C9A84C 55%, #8B6914);
      border-radius: 999px; border: 2px solid #F3EFE6; background-clip: padding-box;
    }

    /* ── Keyframes ─────────────────────────────────────────────────────── */
    @keyframes marqueeL   { from { transform: translateX(0); }    to { transform: translateX(-50%); } }
    @keyframes marqueeR   { from { transform: translateX(-50%); } to { transform: translateX(0); }    }
    @keyframes bannerScroll { from { transform: translateX(0); }  to { transform: translateX(-50%); } }
    @keyframes kenBurns {
      from { transform: scale(1) translate(0, 0); }
      to   { transform: scale(1.12) translate(-1.5%, -1.5%); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes navReveal {
      from { opacity: 0; transform: translateY(-12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Gold shimmer italic ───────────────────────────────────────────── */
    .gold-shimmer {
      background: linear-gradient(
        115deg,
        #8B6914 0%, #C9A84C 18%, #E8C96A 32%, #F5D875 44%,
        #E8C96A 56%, #C9A84C 68%, #8B6914 100%
      );
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 3.8s linear infinite;
      font-style: italic;
      font-weight: 500;
    }

    /* ── Scroll-reveal ─────────────────────────────────────────────────── */
    [data-reveal] {
      opacity: 0;
      will-change: opacity, transform;
    }
    [data-reveal="up"]    { transform: translateY(44px); }
    [data-reveal="left"]  { transform: translateX(36px); }
    [data-reveal="scale"] { transform: scale(0.90); }
    [data-reveal].revealed {
      opacity: 1;
      transform: none !important;
      transition: opacity 0.85s var(--ease-spring), transform 0.85s var(--ease-spring);
    }

    /* ── Floating pill nav ─────────────────────────────────────────────── */
    #lsp-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      pointer-events: none;
    }
    .nav-inner {
      max-width: 1040px;
      margin: 0 auto;
      padding: 22px 36px;
      display: flex; align-items: center; justify-content: space-between;
      transition: all 0.55s var(--ease-spring);
      pointer-events: all;
    }
    #lsp-nav.scrolled .nav-inner {
      margin: 12px auto;
      padding: 10px 14px 10px 22px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(20,17,11,0.09);
      border-radius: 999px;
      box-shadow: 0 8px 44px rgba(20,17,11,0.11);
      animation: navReveal 0.55s var(--ease-spring) both;
    }

    /* ── 3D card tilt ──────────────────────────────────────────────────── */
    .tilt-card {
      transform-style: preserve-3d;
      transition: transform 0.45s var(--ease-spring), box-shadow 0.45s var(--ease-spring);
    }

    /* ── Progress bar ──────────────────────────────────────────────────── */
    #scroll-progress {
      position: fixed; top: 0; left: 0; right: 0; height: 2.5px; z-index: 200;
      pointer-events: none;
    }
    #scroll-progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
      box-shadow: 0 0 10px rgba(201,168,76,.6);
      transition: width 0.08s linear;
    }

    /* ── Section dots ──────────────────────────────────────────────────── */
    #scroll-dots {
      position: fixed; right: 24px; top: 50%; transform: translateY(-50%);
      z-index: 120; display: flex; flex-direction: column; gap: 13px;
    }
    .sdot {
      background: none; border: none; cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: flex-end; gap: 9px; height: 11px;
    }
    .sdot-label {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--gold-ink);
      opacity: 0; transform: translateX(7px);
      transition: all .32s var(--ease-spring); white-space: nowrap;
    }
    .sdot:hover .sdot-label, .sdot.active .sdot-label { opacity: 1; transform: translateX(0); }
    .sdot-pip {
      display: block; border-radius: 999px; background: rgba(20,17,11,.2);
      width: 8px; height: 8px; transition: all .32s var(--ease-spring);
    }
    .sdot.active .sdot-pip {
      width: 10px; height: 10px; background: var(--gold);
      box-shadow: 0 0 0 4px rgba(201,168,76,.18);
    }

    /* ── Scroll-to-top ─────────────────────────────────────────────────── */
    #scroll-top {
      position: fixed; right: 24px; bottom: 24px; z-index: 120;
      width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
      background: #fff; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 28px rgba(20,17,11,.15);
      opacity: 0; transform: translateY(16px) scale(0.85);
      transition: opacity 0.4s var(--ease-spring), transform 0.4s var(--ease-spring),
                  box-shadow 0.25s ease;
      pointer-events: none;
    }
    #scroll-top.visible { opacity: 1; transform: none; pointer-events: all; }
    #scroll-top:hover {
      transform: translateY(-3px) scale(1.07) !important;
      box-shadow: 0 16px 40px rgba(20,17,11,.22) !important;
    }
    #stt-svg { position: absolute; inset: 0; transform: rotate(-90deg); pointer-events: none; }

    /* ── CTA dark button ───────────────────────────────────────────────── */
    .cta-dark {
      font-family: var(--font-body); font-weight: 600; font-size: 17px;
      border-radius: 10px; padding: 16px 38px; border: none; cursor: pointer;
      background: #1C1606; color: #FBFAF7;
      box-shadow: 0 8px 26px rgba(28,22,6,.30);
      transition: all .3s var(--ease-spring);
    }
    .cta-dark:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 18px 44px rgba(28,22,6,.44) !important;
    }

    /* ── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 1100px) { #scroll-dots { display: none; } }
    @media (max-width: 900px) {
      .nav-links, .nav-actions { display: none !important; }
      .nav-burger { display: block !important; }
      .grid-3  { grid-template-columns: 1fr !important; }
      .bento   { grid-template-columns: 1fr !important; }
      .steps   { grid-template-columns: 1fr !important; }
      .why-grid, .footer-grid { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 1100px) and (min-width: 901px) {
      .grid-3 { grid-template-columns: repeat(2,1fr) !important; }
      .bento  { grid-template-columns: repeat(2,1fr) !important; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      [data-reveal] { opacity: 1 !important; transform: none !important; }
      *, *::before, *::after {
        animation-duration: 0.001s !important;
        transition-duration: 0.001s !important;
      }
    }
  </style>
</head>
<body>

<!-- ── Fixed UI chrome ──────────────────────────────────────────────────── -->
<div id="scroll-progress"><div id="scroll-progress-bar"></div></div>

<nav id="lsp-nav" aria-label="Main navigation">
  <div class="nav-inner" id="nav-inner"></div>
</nav>

<div id="scroll-dots" aria-hidden="true"></div>

<button id="scroll-top" title="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg id="stt-svg" width="52" height="52" viewBox="0 0 52 52" aria-hidden="true">
    <circle cx="26" cy="26" r="20" fill="none" stroke="rgba(20,17,11,.07)" stroke-width="2.5"/>
    <circle id="stt-arc" cx="26" cy="26" r="20" fill="none" stroke="#C9A84C" stroke-width="2.5"
      stroke-linecap="round" stroke-dasharray="125.66" stroke-dashoffset="125.66"/>
  </svg>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#14110B"
    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
    style="position:relative;z-index:1" aria-hidden="true">
    <path d="M5 15l7-7 7 7"/>
  </svg>
</button>

<!-- ── React root ───────────────────────────────────────────────────────── -->
<div id="root"></div>

<!-- ═══════════════════════════════════════════════════════════════════════
     REACT COMPONENTS
════════════════════════════════════════════════════════════════════════ -->
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ── Lucide icon ─────────────────────────────────────────────────────── */
function Icon({ name, size=18, color='currentColor', strokeWidth=1.8 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!window.lucide || !ref.current) return;
    ref.current.innerHTML = '';
    const el = document.createElement('i');
    el.setAttribute('data-lucide', name);
    ref.current.appendChild(el);
    window.lucide.createIcons({
      attrs: { width:size, height:size, stroke:color, 'stroke-width':strokeWidth },
      nameAttr: 'data-lucide',
    });
  }, [name, size, color]);
  return <span ref={ref} style={{ display:'inline-flex', lineHeight:0 }} />;
}

/* ── Logo ────────────────────────────────────────────────────────────── */
function Logo({ width=120, variant='dark' }) {
  const src = variant === 'nav' ? 'assets/logo-light.png' : 'assets/logo.png';
  return (
    <img src={src} width={width} alt="Little Sweet Photography"
      style={{ display:'block' }} />
  );
}

/* ── SectionLabel ────────────────────────────────────────────────────── */
function SectionLabel({ children }) {
  return (
    <div style={{ fontFamily:'var(--font-mono)', fontWeight:700, fontSize:12,
      letterSpacing:'0.22em', textTransform:'uppercase', color:'var(--gold-ink)',
      display:'flex', alignItems:'center', gap:9 }}>
      <span style={{ fontSize:9 }}>◆</span>{children}
    </div>
  );
}

/* ── Button ──────────────────────────────────────────────────────────── */
function Button({ variant='primary', size='md', children, onClick, icon, iconRight, style:ext }) {
  const [hover, setHover] = useState(false);
  const [press, setPress] = useState(false);
  const pad = { sm:'9px 18px', md:'13px 26px', lg:'16px 34px' }[size];
  const fs  = { sm:13, md:15, lg:17 }[size];
  const base = {
    fontFamily:'var(--font-body)', fontWeight:600, fontSize:fs,
    borderRadius:10, padding:pad, border:'1.5px solid transparent',
    cursor:'pointer', display:'inline-flex', alignItems:'center', gap:8,
    whiteSpace:'nowrap',
    transition:'all .28s var(--ease-spring)',
    transform: press ? 'scale(0.97)' : hover ? 'translateY(-1px) scale(1.02)' : 'scale(1)',
    ...ext,
  };
  const v = {
    primary: { background: hover ? 'var(--gold-light)' : 'var(--gold)', color:'#1C1606',
      boxShadow: hover ? '0 12px 34px rgba(201,168,76,.52)' : '0 4px 14px rgba(201,168,76,.28)' },
    outline: { background: hover ? '#14110B' : 'transparent', borderColor:'#14110B',
      color: hover ? '#FBFAF7' : '#14110B' },
    ghost:   { background:'transparent', color: hover ? 'var(--gold-ink)' : '#14110B' },
  };
  return (
    <button style={{ ...base, ...v[variant] }} onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => { setHover(false); setPress(false); }}
      onMouseDown={() => setPress(true)} onMouseUp={() => setPress(false)}>
      {icon && <Icon name={icon} size={fs+2} />}
      {children}
      {iconRight && <Icon name={iconRight} size={fs+2} />}
    </button>
  );
}

/* ── StatPill ────────────────────────────────────────────────────────── */
function StatPill({ glyph, value, label }) {
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:8, background:'#fff',
      border:'1px solid var(--border)', borderRadius:999, padding:'10px 18px',
      fontFamily:'var(--font-body)', fontSize:14, color:'#4A463E',
      boxShadow:'0 2px 10px rgba(20,17,11,.05)' }}>
      <span>{glyph}</span>
      <b style={{ color:'var(--gold-ink)', fontWeight:700 }}>{value}</b>
      {label}
    </span>
  );
}

/* ── FeaturePill ─────────────────────────────────────────────────────── */
function FeaturePill({ glyph, children }) {
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:10,
      border:'1px solid var(--border-strong)', borderRadius:999, padding:'11px 20px',
      fontFamily:'var(--font-body)', fontWeight:500, fontSize:14,
      color:'#14110B', background:'#fff' }}>
      <span>{glyph}</span>{children}
    </span>
  );
}

/* ════════════════════════════════════════════════════════════════════════
   HERO
════════════════════════════════════════════════════════════════════════ */
const BANNER_IMGS = [
  'https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=540&q=80',
  'https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=540&q=80',
  'https://images.unsplash.com/photo-1555252333-9f8e92e65df9?w=540&q=80',
  'https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=540&q=80',
  'https://images.unsplash.com/photo-1508739773434-c26b3d09e071?w=540&q=80',
  'https://images.unsplash.com/photo-1544006659-f0b21884ce1d?w=540&q=80',
  'https://images.unsplash.com/photo-1529543544282-ea669407fca3?w=540&q=80',
];

function PhotoBanner() {
  const shots = [...BANNER_IMGS, ...BANNER_IMGS];
  return (
    <div style={{ position:'relative', width:'100%', overflow:'hidden', marginTop:8,
      maskImage:'linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent)',
      WebkitMaskImage:'linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent)' }}
      onMouseEnter={e => {
        const s = e.currentTarget.querySelector('.banner-strip');
        if (s) s.style.animationPlayState = 'paused';
      }}
      onMouseLeave={e => {
        const s = e.currentTarget.querySelector('.banner-strip');
        if (s) s.style.animationPlayState = 'running';
      }}>
      <div className="banner-strip" style={{ display:'flex', gap:18, width:'max-content',
        animation:'bannerScroll 54s linear infinite', padding:'4px 0' }}>
        {shots.map((src, i) => (
          <div key={i} style={{ width:256, height:316, flex:'none', borderRadius:15,
            overflow:'hidden', border:'1px solid var(--border)',
            boxShadow:'0 12px 34px rgba(20,17,11,.09)', background:'#EDE7DA' }}>
            <div style={{ width:'100%', height:'100%',
              backgroundImage:`url('${src}')`, backgroundSize:'cover', backgroundPosition:'center',
              animation:`kenBurns ${14+(i%5)*2}s ease-in-out ${i%4}s infinite alternate` }} />
          </div>
        ))}
      </div>
    </div>
  );
}

function Hero({ onExplore }) {
  const spotlightRef = useRef(null);
  const heroRef      = useRef(null);

  useEffect(() => {
    const hero = heroRef.current;
    if (!hero) return;
    const onMove = (e) => {
      if (!spotlightRef.current) return;
      const r = hero.getBoundingClientRect();
      const x = e.clientX - r.left;
      const y = e.clientY - r.top;
      spotlightRef.current.style.background =
        `radial-gradient(680px circle at ${x}px ${y}px, rgba(201,168,76,0.09), transparent 55%)`;
    };
    hero.addEventListener('mousemove', onMove);
    return () => hero.removeEventListener('mousemove', onMove);
  }, []);

  return (
    <header id="hero" ref={heroRef}
      style={{ position:'relative', minHeight:'94vh',
        display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center',
        textAlign:'center', padding:'88px 24px 0', overflow:'hidden' }}>

      {/* Three.js canvas — injected by initBokeh() */}
      <canvas id="lsp-bokeh"
        style={{ position:'absolute', inset:0, width:'100%', height:'100%',
          pointerEvents:'none', zIndex:0, opacity:0 }}
        aria-hidden="true" />

      {/* cursor spotlight */}
      <div ref={spotlightRef}
        style={{ position:'absolute', inset:0, pointerEvents:'none', zIndex:1,
          background:'radial-gradient(680px circle at 50% 40%, rgba(201,168,76,0.07), transparent 55%)' }} />

      {/* grain overlay */}
      <div style={{ position:'absolute', inset:0, zIndex:1, pointerEvents:'none', opacity:0.032,
        backgroundImage:`url('assets/grain-texture.svg')`, backgroundSize:'200px' }} />

      <div style={{ position:'relative', zIndex:2, maxWidth:1020 }}>

        <div data-reveal="up" style={{ '--d':'0s' }}>
          <SectionLabel>Little Sweet Photography</SectionLabel>
        </div>

        <div data-reveal="up" style={{ '--d':'0.12s' }}>
          <h1 style={{ fontFamily:'var(--font-display)', fontWeight:800,
            fontSize:'clamp(42px, 7.2vw, 88px)',
            lineHeight:1.03, letterSpacing:'-0.025em', color:'#14110B', margin:'22px 0 0' }}>
            <span style={{ display:'block' }}>Capture Every</span>
            <span style={{ display:'block' }}>
              <em className="gold-shimmer">Precious</em>{' '}Moment
            </span>
          </h1>
        </div>

        <div data-reveal="up" style={{ '--d':'0.25s' }}>
          <p style={{ fontFamily:'var(--font-body)', fontSize:'clamp(16px,2vw,20px)',
            lineHeight:1.65, color:'#4A463E', maxWidth:600, margin:'26px auto 0' }}>
            Nepal's premier photography booking platform — connecting you with handpicked
            professionals for life's most unforgettable moments.
          </p>
        </div>

        <div data-reveal="up" style={{ '--d':'0.37s',
          display:'flex', gap:14, justifyContent:'center', marginTop:38, flexWrap:'wrap' }}>
          <Button variant="primary" size="lg" onClick={onExplore} iconRight="arrow-right">
            Explore Packages
          </Button>
          <Button variant="outline" size="lg" icon="play">Watch Our Work</Button>
        </div>

        <div data-reveal="up" style={{ '--d':'0.48s',
          display:'flex', gap:12, justifyContent:'center', marginTop:36, flexWrap:'wrap' }}>
          <StatPill glyph="📷" value="150+" label="Photographers" />
          <StatPill glyph="⭐" value="500+" label="Happy Clients" />
          <StatPill glyph="🏆" value="7 Years" label="of Excellence" />
        </div>
      </div>

      <div data-reveal="up" style={{ '--d':'0.60s', width:'100%', marginTop:'auto', paddingTop:54 }}>
        <PhotoBanner />
      </div>
    </header>
  );
}

/* ── SearchBar ───────────────────────────────────────────────────────── */
function SearchBar({ onSearch }) {
  const Field = ({ ph }) => (
    <div style={{ flex:1, minWidth:150, display:'flex', alignItems:'center', gap:8,
      background:'#F3EFE6', border:'1px solid var(--border)', borderRadius:10,
      padding:'0 14px', height:50, fontFamily:'var(--font-body)', fontSize:14,
      color:'#6B665C', cursor:'pointer' }}>
      <span>{ph}</span>
      <span style={{ marginLeft:'auto', color:'var(--gold-ink)', fontSize:10 }}>▾</span>
    </div>
  );
  return (
    <section style={{ maxWidth:960, margin:'-44px auto 0', padding:'0 24px',
      position:'relative', zIndex:5 }}>
      <div data-reveal="up">
        <div style={{ background:'#fff', border:'1px solid var(--border)',
          borderRadius:18, padding:'26px 28px',
          boxShadow:'0 30px 72px rgba(20,17,11,.13)' }}>
          <h3 style={{ fontFamily:'var(--font-display)', fontWeight:600, fontSize:24,
            color:'#14110B', margin:'0 0 16px' }}>Find Your Perfect Package</h3>
          <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>

/* 3-D tilt hook */
function useTilt(strength=7) {
  const ref = useRef(null);
  const onMove = useCallback((e) => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width  - 0.5;
    const y = (e.clientY - r.top)  / r.height - 0.5;
    el.style.transform =
      `perspective(900px) rotateY(${x*strength}deg) rotateX(${-y*strength}deg) scale(1.025)`;
  }, [strength]);
  const onLeave = useCallback(() => {
    if (ref.current)
      ref.current.style.transform = 'perspective(900px) rotateY(0) rotateX(0) scale(1)';
  }, []);
  return { ref, onMouseMove:onMove, onMouseLeave:onLeave };
}

/* Animated counter */
function CountUp({ target, suffix='' }) {
  const [val, setVal] = useState(0);
  const ref     = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const n = parseInt(target, 10) || 0;
        const dur = 1500, steps = 55;
        let step = 0;
        const id = setInterval(() => {
          step++;
          setVal(Math.round((n * step) / steps));
          if (step >= steps) { setVal(n); clearInterval(id); }
        }, dur / steps);
      }
    }, { threshold: 0.6 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [target]);
  return <span ref={ref} style={{ fontVariantNumeric:'tabular-nums' }}>{val}{suffix}</span>;
}

/* ════════════════════════════════════════════════════════════════════════

════════════════════════════════════════════════════════════════════════ */
const CER_LIST = ['Baby Shower','Bratabandha','Birthday','Pasni','Party','Wedding',
  'Vacation Photography','Newborn','Maternity','Toddler','Family Portrait'];
const BIZ_LIST = ['Food Photography','School Events','Corporate Events','Brand Video',
  'Product Photoshoot','Boutique Photography','Profile & Headshot'];

function NavDropdown({ label, items, onPick }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ position:'relative' }}
      onMouseEnter={() => setOpen(true)} onMouseLeave={() => setOpen(false)}>
      <button style={{ background:'none', border:'none', cursor:'pointer',
        display:'flex', alignItems:'center', gap:6,
        fontFamily:'var(--font-body)', fontWeight:500, fontSize:15,
        color: open ? 'var(--gold-ink)' : '#14110B',
        padding:'8px 0', transition:'color .2s' }}>
        {label}
        <span style={{ fontSize:9, transition:'transform .2s',
          transform: open ? 'rotate(180deg)' : 'none' }}>▾</span>
      </button>
      {open && (
        <div style={{ position:'absolute', top:'100%', left:'50%',
          transform:'translateX(-50%)', marginTop:8,
          background:'rgba(255,255,255,0.98)', backdropFilter:'blur(20px)',
          border:'1px solid var(--border)', borderRadius:14, padding:10,
          display:'grid', gridTemplateColumns:'1fr 1fr', gap:2,
          width:370, boxShadow:'0 26px 64px rgba(20,17,11,.14)', zIndex:50,
          animation:'fadeSlideUp .22s var(--ease-spring) both' }}>
          {items.map(it => (
            <div key={it} onClick={() => onPick && onPick(it)}
              style={{ fontFamily:'var(--font-body)', fontSize:13.5, color:'#4A463E',
                padding:'9px 12px', borderRadius:8, cursor:'pointer', transition:'all .14s' }}
              onMouseEnter={e => {
                e.currentTarget.style.background = 'rgba(201,168,76,.12)';
                e.currentTarget.style.color = 'var(--gold-ink)';
              }}
              onMouseLeave={e => {
                e.currentTarget.style.background = 'transparent';
                e.currentTarget.style.color = '#4A463E';
              }}>{it}</div>
          ))}
        </div>
      )}

  );
}

function NavLink({ children, onClick, active }) {
  const [hover, setHover] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ background:'none', border:'none', cursor:'pointer', position:'relative',
        fontFamily:'var(--font-body)', fontWeight:500, fontSize:15,
        color:(hover||active) ? 'var(--gold-ink)' : '#14110B',
        padding:'8px 0', transition:'color .2s' }}>
      {children}
      <span style={{ position:'absolute', left:0, bottom:1, height:1.5,
        background:'var(--gold)', borderRadius:1,
        width:(hover||active) ? '100%' : '0%',
        transition:'width .32s var(--ease-spring)' }} />
    </button>
  );
}

function Navbar({ onBook, onNav, route, onPick }) {
  const [drawer, setDrawer] = useState(false);
  const navEl = document.getElementById('nav-inner');
  if (!navEl) return null;

  const navContent = (
    <React.Fragment>
      <div style={{ cursor:'pointer', flexShrink:0 }} onClick={() => onNav('home')}>
        <Logo width={108} variant="nav" />
      </div>
      <div className="nav-links" style={{ display:'flex', alignItems:'center', gap:28 }}>
        <NavLink active={route==='home'}    onClick={() => onNav('home')}>Home</NavLink>
        <NavLink active={route==='about'}   onClick={() => onNav('about')}>About</NavLink>
        <NavDropdown label="Ceremonies" items={CER_LIST} onPick={onPick} />
        <NavDropdown label="Business"   items={BIZ_LIST} onPick={onPick} />
        <NavLink active={route==='contact'} onClick={() => onNav('contact')}>Contact</NavLink>
      </div>
      <div className="nav-actions" style={{ display:'flex', alignItems:'center', gap:12 }}>
        <Button variant="outline" size="sm" onClick={() => onNav('login')}>Client Login</Button>
        <Button variant="primary" size="sm" onClick={onBook}>Book Now</Button>
      </div>
      <button className="nav-burger" onClick={() => setDrawer(true)}
        style={{ display:'none', background:'none', border:'none',
          color:'var(--gold-ink)', cursor:'pointer' }}>
        <Icon name="menu" size={26} />
      </button>
    </React.Fragment>
  );

  return (
    <React.Fragment>
      {ReactDOM.createPortal(navContent, navEl)}
      {drawer && ReactDOM.createPortal(
        <div style={{ position:'fixed', inset:0, zIndex:200,
          background:'rgba(255,255,255,0.98)', backdropFilter:'blur(20px)',
          padding:32, display:'flex', flexDirection:'column', gap:8 }}>
          <div style={{ display:'flex', justifyContent:'space-between',
            alignItems:'center', marginBottom:24 }}>
            <Logo width={110} variant="nav" />
            <button onClick={() => setDrawer(false)}
              style={{ background:'none', border:'none',
                color:'var(--gold-ink)', cursor:'pointer' }}>
              <Icon name="x" size={28} />
            </button>
          </div>
          {['Home','About','Contact'].map(l => (
            <div key={l}
              onClick={() => { onNav(l.toLowerCase()); setDrawer(false); }}
              style={{ fontFamily:'var(--font-display)', fontSize:32, color:'#14110B',
                padding:'10px 0', cursor:'pointer', borderBottom:'1px solid var(--border)' }}>
              {l}
            </div>
          ))}
          <div style={{ marginTop:24, display:'flex', flexDirection:'column', gap:12 }}>
            <Button variant="outline" onClick={() => { onNav('login'); setDrawer(false); }}>Client Login</Button>
            <Button variant="primary" onClick={() => { onBook(); setDrawer(false); }}>Book Now</Button>
          </div>
        </div>,
        document.body
      )}
    </React.Fragment>
  );
}

/* ════════════════════════════════════════════════════════════════════════
   APP
════════════════════════════════════════════════════════════════════════ */
function App() {
  const [route,   setRoute]   = useState('home');
  const [booking, setBooking] = useState({ open:false, preset:'' });
  const [login,   setLogin]   = useState(false);
  const [toast,   setToast]   = useState({ show:false, text:'' });

  useEffect(() => { window.lucide && window.lucide.createIcons(); });

  const openBooking = (preset='') => setBooking({ open:true, preset });
  const confirm = (preset) => {
    setBooking({ open:false, preset:'' });
    setToast({ show:true, text:`We'll confirm your ${preset||'session'} shortly.` });
    setTimeout(() => setToast({ show:false, text:'' }), 4200);
  };
  const onNav = (r) => {
    if (r === 'login') setLogin(true); else setRoute(r);
    window.scrollTo({ top:0, behavior:'smooth' });
  };

  return (
    <div style={{ background:'var(--cream)', minHeight:'100vh' }}>
      <Navbar route={route} onNav={onNav} onBook={() => openBooking()} onPick={p => openBooking(p)} />
      <Hero onExplore={() => {
        const el = document.getElementById('ceremonies');
        el && window.scrollTo({ top: el.offsetTop - 70, behavior:'smooth' });
      }} />
      <SearchBar onSearch={t => openBooking(typeof t === 'string' ? t : '')} />
      <Ceremonies onBook={openBooking} />
      <Business   onBook={openBooking} />
      <WhyChoose />
      <HowItWorks />
      <Testimonials />
      <FinalCTA onBook={() => openBooking()} />
      <Footer onNav={onNav} />

      <BookingModal open={booking.open} preset={booking.preset}
        onClose={() => setBooking({ open:false, preset:'' })} onConfirm={confirm} />
      <LoginModal open={login} onClose={() => setLogin(false)} />
      <Toast show={toast.show} text={toast.text} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     VANILLA JS — scroll chrome + reveal system + Three.js bokeh
════════════════════════════════════════════════════════════════════════ -->
<script>
/* ── Scroll chrome (progress bar, nav pill, scroll-top) ──────────────── */
(function () {
  var bar  = document.getElementById('scroll-progress-bar');
  var nav  = document.getElementById('lsp-nav');
  var stt  = document.getElementById('scroll-top');
  var arc  = document.getElementById('stt-arc');
  var C    = 2 * Math.PI * 20;   // r=20 circumference
  var raf  = 0;

  function update() {
    raf = 0;
    var h   = document.documentElement;
    var max = h.scrollHeight - h.clientHeight;
    var p   = max > 0 ? Math.min(1, h.scrollTop / max) : 0;

    bar.style.width = (p * 100) + '%';
    arc.style.strokeDashoffset = C * (1 - p);

    if (h.scrollTop > 80) nav.classList.add('scrolled');
    else                   nav.classList.remove('scrolled');

    if (p > 0.06) stt.classList.add('visible');
    else          stt.classList.remove('visible');
  }

  window.addEventListener('scroll', function () {
    if (!raf) raf = requestAnimationFrame(update);
  }, { passive: true });
  window.addEventListener('resize', function () {
    if (!raf) raf = requestAnimationFrame(update);
  });
  update();
}());

/* ── Scroll-reveal IntersectionObserver ─────────────────────────────── */
(function () {
  var observed = new WeakSet();

  function wire() {
    var els = document.querySelectorAll('[data-reveal]:not(.revealed)');
    els.forEach(function (el) {
      if (observed.has(el)) return;
      observed.add(el);

      /* set transition delay from CSS variable --d if present */
      var delay = getComputedStyle(el).getPropertyValue('--d').trim();
      if (delay) el.style.transitionDelay = delay;

      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            e.target.classList.add('revealed');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -4% 0px' });

      io.observe(el);
    });
  }

  /* Initial call — React hasn't rendered yet, so retry */
  setTimeout(wire, 350);
  setTimeout(wire, 800);
  setTimeout(wire, 1400);

  /* Watch for new elements added by React */
  var mo = new MutationObserver(function () { wire(); });
  var root = document.getElementById('root') || document.body;
  mo.observe(root, { childList: true, subtree: true });
}());

/* ── Section nav dots ────────────────────────────────────────────────── */
(function () {
  var SECS = [
    { id: 'hero',       label: 'Home' },
    { id: 'ceremonies', label: 'Ceremonies' },
    { id: 'business',   label: 'Business' },
    { id: 'why',        label: 'Why LSP' },
    { id: 'how',        label: 'How It Works' },
    { id: 'voices',     label: 'Reviews' },
    { id: 'book',       label: 'Book' },
  ];

  var container = document.getElementById('scroll-dots');
  if (!container) return;

  SECS.forEach(function (s) {
    var btn = document.createElement('button');
    btn.className = 'sdot';
    btn.setAttribute('data-sec', s.id);
    btn.innerHTML =
      '<span class="sdot-label">' + s.label + '</span>' +
      '<span class="sdot-pip"></span>';
    btn.addEventListener('click', function () {
      var el = document.getElementById(s.id);
      if (el) window.scrollTo({ top: s.id === 'hero' ? 0 : el.offsetTop - 70, behavior: 'smooth' });
    });
    container.appendChild(btn);
  });

  var io = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) {
        document.querySelectorAll('.sdot').forEach(function (b) { b.classList.remove('active'); });
        var btn = container.querySelector('[data-sec="' + e.target.id + '"]');
        if (btn) btn.classList.add('active');
      }
    });
  }, { threshold: 0, rootMargin: '-45% 0px -45% 0px' });

  function watchSections() {
    SECS.forEach(function (s) {
      var el = document.getElementById(s.id);
      if (el && !el._dotWatched) { el._dotWatched = true; io.observe(el); }
    });
  }
  setTimeout(watchSections, 700);
  var mo = new MutationObserver(watchSections);
  mo.observe(document.body, { childList: true, subtree: true });
}());

/* ── Three.js Bokeh ──────────────────────────────────────────────────── */
(function () {
  function initBokeh() {
    var canvas = document.getElementById('lsp-bokeh');
    if (!canvas || typeof THREE === 'undefined') return;

    var hero = canvas.parentElement;
    var W = hero.offsetWidth  || window.innerWidth;
    var H = hero.offsetHeight || window.innerHeight;

    var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: false });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setClearColor(0x000000, 0);

    var scene  = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 100);
    camera.position.z = 5;

    /* Bokeh sprite texture */
    function makeTex(edge) {
      var s = 128, c = document.createElement('canvas');
      c.width = c.height = s;
      var ctx = c.getContext('2d');
      var g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
      g.addColorStop(0,    'rgba(255,255,255,1)');
      g.addColorStop(edge, 'rgba(255,255,255,0.8)');
      g.addColorStop(1,    'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, s, s);
      return new THREE.CanvasTexture(c);
    }
    var softTex  = makeTex(0.60);
    var sharpTex = makeTex(0.28);

    var PALETTE = [
      new THREE.Color('#C9A84C'),
      new THREE.Color('#E8C96A'),
      new THREE.Color('#F3EFE6'),
      new THREE.Color('#8B6914'),
      new THREE.Color('#F5D875'),
    ];

    var layers = [];

    function makeLayer(count, spreadX, spreadY, zMin, zMax, size, opacity, tex, colorN) {
      var pos    = new Float32Array(count * 3);
      var colors = new Float32Array(count * 3);
      var spd    = [];
      var ph     = [];

      for (var i = 0; i < count; i++) {
        pos[i*3]   = (Math.random() - 0.5) * spreadX;
        pos[i*3+1] = (Math.random() - 0.5) * spreadY;
        pos[i*3+2] = zMin + Math.random() * (zMax - zMin);
        var col = PALETTE[Math.floor(Math.random() * colorN)];
        colors[i*3]   = col.r;
        colors[i*3+1] = col.g;
        colors[i*3+2] = col.b;
        spd.push(0.12 + Math.random() * 0.28);
        ph.push(Math.random() * Math.PI * 2);
      }

      var geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

      var mat = new THREE.PointsMaterial({
        size: size, map: tex, vertexColors: true,
        transparent: true, opacity: opacity,
        depthWrite: false, blending: THREE.AdditiveBlending,
        sizeAttenuation: true,
      });

      var pts = new THREE.Points(geo, mat);
      scene.add(pts);
      layers.push({ pts: pts, spd: spd, ph: ph, count: count });
    }

    /* back: large soft blobs */
    makeLayer(13, 14, 9, -3, -1, 0.90, 0.09, softTex,  3);
    /* mid: medium gold orbs */
    makeLayer(20, 11, 8, -1,  1, 0.22, 0.52, sharpTex, 2);
    /* front: tiny sparkles  */
    makeLayer(36, 13, 9,  1,  3, 0.07, 0.72, sharpTex, 2);

    var mx = 0, my = 0, tx = 0, ty = 0;
    document.addEventListener('mousemove', function (e) {
      mx = (e.clientX / window.innerWidth  - 0.5) * 2;
      my = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    var clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      var t = clock.getElapsedTime();

      tx += (mx - tx) * 0.022;
      ty += (my - ty) * 0.022;
      camera.position.x = tx * 0.38;
      camera.position.y = ty * 0.24;
      camera.lookAt(0, 0, 0);

      layers.forEach(function (L) {
        var arr = L.pts.geometry.attributes.position.array;
        for (var i = 0; i < L.count; i++) {
          arr[i*3+1] += Math.sin(t * L.spd[i] + L.ph[i]) * 0.0007;
          arr[i*3]   += Math.cos(t * L.spd[i] * 0.65 + L.ph[i]) * 0.0004;
        }
        L.pts.geometry.attributes.position.needsUpdate = true;
      });

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', function () {
      var W2 = hero.offsetWidth  || window.innerWidth;
      var H2 = hero.offsetHeight || window.innerHeight;
      camera.aspect = W2 / H2;
      camera.updateProjectionMatrix();
      renderer.setSize(W2, H2);
    });

    /* Fade canvas in after Three.js is ready */
    setTimeout(function () {
      canvas.style.transition = 'opacity 1.4s ease';
      canvas.style.opacity = '0.92';
    }, 180);
  }

  /* Wait for React to mount the hero canvas */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { setTimeout(initBokeh, 320); });
  } else {
    setTimeout(initBokeh, 320);
  }
}());
</script>
